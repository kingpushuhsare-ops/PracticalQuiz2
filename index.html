<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame • Designer Hall • Triple Chandelier</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        .instruction {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #222; padding: 10px 20px; border-radius: 40px;
            font-size: 15px; font-weight: bold; border: 2px solid #d4a56c;
            pointer-events: none; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="instruction">💡 Triple Designer Chandeliers • 🪑 Black Legs • 🪵 Walnut Floor</div>

    <a-scene background="color: #ececec" fog="type: exponential; color: #dfd3c3; density: 0.01">
        
        <!-- ========== LIGHTING SYSTEM ========= -->
        <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
        <a-light type="directional" position="5 10 7" intensity="0.8" color="#fffaf0"></a-light>
        
        <!-- Individual Point Lights for each Chandelier for realistic floor highlights -->
        <a-light type="point" position="0 5 -3.2" intensity="1.2" color="#ffdaab" distance="15"></a-light>
        <a-light type="point" position="-6 5 -3.2" intensity="0.8" color="#ffdaab" distance="12"></a-light>
        <a-light type="point" position="6 5 -3.2" intensity="0.8" color="#ffdaab" distance="12"></a-light>

        <!-- ========== GRAND CEILING STYLE ========= -->
        <a-box position="0 7.2 -4" width="24" height="0.2" depth="20" color="#4a3b2c"></a-box>
        <a-box position="0 6.9 -2" width="22" height="0.6" depth="0.4" color="#1a110a"></a-box>
        <a-box position="0 6.9 -5" width="22" height="0.6" depth="0.4" color="#1a110a"></a-box>

        <!-- ========== THREE DESIGNER CHANDELIERS ========== -->
        
        <!-- 1. Central Chandelier (Main) -->
        <a-entity position="0 6.8 -3.2">
            <a-cylinder radius="0.05" height="1.8" color="#222" position="0 -0.6 0"></a-cylinder>
            <a-torus radius="1.5" radius-tubular="0.1" color="#c5a059" rotation="90 0 0" position="0 -1.5 0"></a-torus>
            <a-sphere position="1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="-1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 -1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
        </a-entity>

        <!-- 2. Left Chandelier (Designer Accessory) -->
        <a-entity position="-7 6.8 -3.2" scale="0.8 0.8 0.8">
            <a-cylinder radius="0.05" height="1.8" color="#222" position="0 -0.6 0"></a-cylinder>
            <a-torus radius="1.5" radius-tubular="0.1" color="#c5a059" rotation="90 0 0" position="0 -1.5 0"></a-torus>
            <a-sphere position="1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="-1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 -1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
        </a-entity>

        <!-- 3. Right Chandelier (Designer Accessory) -->
        <a-entity position="7 6.8 -3.2" scale="0.8 0.8 0.8">
            <a-cylinder radius="0.05" height="1.8" color="#222" position="0 -0.6 0"></a-cylinder>
            <a-torus radius="1.5" radius-tubular="0.1" color="#c5a059" rotation="90 0 0" position="0 -1.5 0"></a-torus>
            <a-sphere position="1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="-1.4 -1.3 0" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
            <a-sphere position="0 -1.3 -1.4" radius="0.2" color="#fff" emissive="#fff"></a-sphere>
        </a-entity>

        <!-- ========== DESIGNER WALLS ========= -->
        <a-entity position="0 3.5 -13">
            <a-box width="22" height="7" depth="0.1" color="#1a2a44"></a-box>
            <a-box position="0 0 0.1" width="8" height="7" depth="0.1" color="#2c2c2c"></a-box>
            <a-box position="-4 0 0.15" width="0.1" height="7" depth="0.1" color="#d4a56c"></a-box>
            <a-box position="4 0 0.15" width="0.1" height="7" depth="0.1" color="#d4a56c"></a-box>
        </a-entity>

        <a-entity position="-11 3.5 -4" rotation="0 90 0">
            <a-box width="18" height="7" depth="0.1" color="#1e3d2b"></a-box>
            <a-box position="-4 0 0.1" width="4" height="7" depth="0.1" color="#7d8c7c"></a-box>
            <a-box position="0 0 0.2" width="18" height="0.1" depth="0.1" color="#d4a56c"></a-box>
        </a-entity>

        <a-entity position="11 3.5 -4" rotation="0 -90 0">
            <a-box width="18" height="7" depth="0.1" color="#8e4a2d"></a-box>
            <a-box position="0 0 0.1" width="6" height="7" depth="0.1" color="#c2b280"></a-box>
        </a-entity>

        <!-- ========== AIR CONDITIONING UNIT ========= -->
        <a-entity position="0 5.8 -12.8">
            <a-box width="2.8" height="0.7" depth="0.4" color="#fcfcfc"></a-box>
            <a-sphere radius="0.04" color="#00ff00" position="1.2 -0.2 0.22" emissive="#00ff00"></a-sphere>
        </a-entity>

        <!-- ========== DESIGNER DINING TABLE ========= -->
        <a-entity position="0 0 -3.2">
            <a-box position="-1.2 0.75 0" width="1.2" height="1.5" depth="1.8" color="#1a1512" roughness="0.3"></a-box>
            <a-box position="-1.2 0.05 0" width="1.3" height="0.1" depth="1.9" color="#d4a56c"></a-box> 
            <a-box position="1.2 0.75 0" width="1.2" height="1.5" depth="1.8" color="#1a1512" roughness="0.3"></a-box>
            <a-box position="1.2 0.05 0" width="1.3" height="0.1" depth="1.9" color="#d4a56c"></a-box> 
            <a-box position="0 1.55 0" width="4.2" height="0.15" depth="2.8" color="#2b1e16"></a-box> 
            <a-box position="0 1.65 0" width="4.4" height="0.05" depth="3.0" color="#111111" metalness="0.5" roughness="0.1"></a-box> 
            <a-box position="0 1.6 1.5" width="4.4" height="0.05" depth="0.02" color="#d4a56c"></a-box>
            <a-box position="0 1.6 -1.5" width="4.4" height="0.05" depth="0.02" color="#d4a56c"></a-box>
        </a-entity>

        <!-- ========== TALL CHAIRS (BLACK LEGS) ========= -->
        <a-entity position="-2.3 0 -3.2" rotation="0 90 0" scale="1.3 1.3 1.3">
            <a-box position="0 0.6 0" width="1" height="0.25" depth="1" color="#d4a56c"></a-box>
            <a-box position="0 1.6 -0.45" width="1" height="1.8" depth="0.2" color="#d4a56c"></a-box>
            <a-cylinder position="-0.4 0.3 0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="0.4 0.3 0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="-0.4 0.3 -0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="0.4 0.3 -0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
        </a-entity>

        <a-entity position="2.3 0 -3.2" rotation="0 -90 0" scale="1.3 1.3 1.3">
            <a-box position="0 0.6 0" width="1" height="0.25" depth="1" color="#d4a56c"></a-box>
            <a-box position="0 1.6 -0.45" width="1" height="1.8" depth="0.2" color="#d4a56c"></a-box>
            <a-cylinder position="-0.4 0.3 0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="0.4 0.3 0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="-0.4 0.3 -0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
            <a-cylinder position="0.4 0.3 -0.4" radius="0.08" height="0.8" color="#111111" metalness="0.8"></a-cylinder>
        </a-entity>

        <!-- ========== TABLE ITEMS & CUPS ========= -->
        <a-entity position="-1.0 1.78 -3.5">
            <a-cylinder radius="0.25" height="0.65" color="#cc0000"></a-cylinder>
            <a-text value="MILO" align="center" position="0 0 0.26" scale="0.5 0.5 0.5" color="white" bold="true"></a-text>
        </a-entity>
        <a-entity position="0.6 1.78 -2.4">
            <a-cylinder radius="0.24" height="0.7" color="#ffffff"></a-cylinder>
            <a-text value="MILK" align="center" position="0 0 0.25" scale="0.5 0.5 0.5" color="#0055aa" bold="true"></a-text>
        </a-entity>
        <a-entity position="-1.2 1.68 -2.8">
            <a-cylinder radius="0.15" height="0.3" color="#ffffff"></a-cylinder> 
            <a-torus radius="0.1" radius-tubular="0.02" arc="180" rotation="0 0 -90" position="0.15 0.1 0" color="#ffffff"></a-torus>
        </a-entity>
        <a-entity position="1.1 1.68 -3.7">
            <a-cylinder radius="0.15" height="0.3" color="#cfd8dc"></a-cylinder> 
            <a-torus radius="0.1" radius-tubular="0.02" arc="180" rotation="0 180 -90" position="-0.15 0.1 0" color="#cfd8dc"></a-torus>
        </a-entity>

        <!-- ========== FLOWER POTS ========= -->
        <a-entity position="-9.5 0 -11">
            <a-cylinder radius="0.5" height="0.9" color="#6d4c41"></a-cylinder>
            <a-sphere radius="0.7" color="#2e7d32" position="0 1.2 0"></a-sphere>
        </a-entity>
        <a-entity position="9.5 0 -11">
            <a-cylinder radius="0.5" height="0.9" color="#6d4c41"></a-cylinder>
            <a-sphere radius="0.7" color="#2e7d32" position="0 1.2 0"></a-sphere>
        </a-entity>

        <!-- ========== CLASSY WALNUT WOOD FLOOR ========= -->
        <a-plane rotation="-90 0 0" width="30" height="30" color="#4a3b2c" roughness="0.8"></a-plane>
        <a-circle position="0 0.02 -3.2" radius="4" rotation="-90 0 0" color="#3a2f24" opacity="0.6"></a-circle>
        <a-ring position="0 0.03 -3.2" radius-inner="3.9" radius-outer="4.0" rotation="-90 0 0" color="#d4a56c"></a-ring>

        <!-- ========== CAMERA ========= -->
        <a-entity camera position="0 4 8" look-controls wasd-controls></a-entity>
    </a-scene>
</body>
</html>
